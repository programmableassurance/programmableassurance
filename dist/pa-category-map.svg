<svg width="700" height="600" viewBox="0 0 700 600"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      .box     { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.5; }
      .box-pa  { fill: #eef2ff; stroke: #5b6af0; stroke-width: 2.5; }
      .label   { font-size: 13px; font-weight: 700; fill: #111827; }
      .label-pa{ font-size: 14px; font-weight: 700; fill: #3730a3; }
      .sub     { font-size: 11px; fill: #6b7280; }
      .sub-pa  { font-size: 11px; fill: #4f46e5; }
      .spoke   { stroke: #c7d2fe; stroke-width: 2; }
    </style>
  </defs>

  <!-- Spokes — plain lines, no arrows, no direction -->
  <line class="spoke" x1="350" y1="300" x2="350" y2="110"/>
  <line class="spoke" x1="350" y1="300" x2="120" y2="210"/>
  <line class="spoke" x1="350" y1="300" x2="580" y2="210"/>
  <line class="spoke" x1="350" y1="300" x2="120" y2="420"/>
  <line class="spoke" x1="350" y1="300" x2="580" y2="420"/>

  <!-- GRC — top center -->
  <rect class="box" x="255" y="30" width="190" height="70" rx="12"/>
  <text class="label" x="350" y="62" text-anchor="middle">GRC</text>
  <text class="sub"   x="350" y="82" text-anchor="middle">Defines governance intent</text>

  <!-- Zero Trust — left upper -->
  <rect class="box" x="20" y="155" width="175" height="80" rx="12"/>
  <text class="label" x="107" y="187" text-anchor="middle">Zero Trust</text>
  <text class="sub"   x="107" y="207" text-anchor="middle">Identity and network</text>
  <text class="sub"   x="107" y="223" text-anchor="middle">enforcement</text>

  <!-- Policy-as-Code — right upper -->
  <rect class="box" x="505" y="155" width="175" height="80" rx="12"/>
  <text class="label" x="592" y="187" text-anchor="middle">Policy-as-Code</text>
  <text class="sub"   x="592" y="207" text-anchor="middle">Executes governance</text>
  <text class="sub"   x="592" y="223" text-anchor="middle">at decision points</text>

  <!-- PA — center hub -->
  <rect class="box-pa" x="210" y="230" width="280" height="140" rx="14"/>
  <text class="label-pa" x="350" y="264" text-anchor="middle">Programmable Assurance</text>
  <text class="sub-pa"   x="350" y="288" text-anchor="middle">Continuously aligns intent with outcomes</text>
  <text class="sub-pa"   x="350" y="308" text-anchor="middle">through accountability, evidence,</text>
  <text class="sub-pa"   x="350" y="328" text-anchor="middle">and feedback</text>
  <text class="sub-pa"   x="350" y="356" text-anchor="middle">across any governance domain</text>

  <!-- Platform Engineering — left lower -->
  <rect class="box" x="20" y="375" width="175" height="80" rx="12"/>
  <text class="label" x="107" y="403" text-anchor="middle">Platform Engineering</text>
  <text class="sub"   x="107" y="423" text-anchor="middle">Embeds controls into</text>
  <text class="sub"   x="107" y="439" text-anchor="middle">developer workflows</text>

  <!-- AI Governance — right lower -->
  <rect class="box" x="505" y="375" width="175" height="80" rx="12"/>
  <text class="label" x="592" y="403" text-anchor="middle">AI Governance</text>
  <text class="sub"   x="592" y="423" text-anchor="middle">Governs AI systems</text>
  <text class="sub"   x="592" y="439" text-anchor="middle">and model deployment</text>

</svg>
